<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IVC Seoul — WYD Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    :root { --primary-red: #cc0000; --primary-blue: #003380; --easter-gold: #d4af37; --parchment: #FDFBF7; --parchment-dark: #F4EFE6; --dark-text: #2C2A29; --transition-smooth: 0.4s ease; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', 'Noto Sans KR', sans-serif; background-color: var(--parchment); color: var(--dark-text); background-image: radial-gradient(var(--parchment-dark) 1px, transparent 1px); background-size: 40px 40px; }

    nav { position: fixed; top: 0; width: 100%; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(253, 251, 247, 0.9); backdrop-filter: blur(12px); box-shadow: 0 2px 20px rgba(0,0,0,0.04); border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
    .nav-left { display: flex; gap: 8px; flex: 1; justify-content: flex-start; align-items: center; flex-wrap: wrap; }
    .logo-container { flex: 1; text-align: center; }
    .nav-right { flex: 1; text-align: right; }
    .logo { font-family: 'Cormorant Garamond', serif; font-weight: 700; color: var(--primary-blue); text-decoration: none; font-size: 1.6rem; letter-spacing: 1px; text-transform: uppercase; }
    
    .lang-btn { background: transparent; border: 1px solid rgba(212, 175, 55, 0.5); color: var(--primary-blue); width: 32px; height: 32px; border-radius: 50%; font-size: 0.85rem; font-weight: 600; font-family: 'Jost', 'Noto Sans KR', sans-serif; cursor: pointer; transition: var(--transition-smooth); display: flex; align-items: center; justify-content: center; padding: 0; }
    .lang-btn:hover, .lang-btn.active { background: var(--easter-gold); color: var(--white); border-color: var(--easter-gold); box-shadow: 0 4px 10px rgba(212,175,55,0.3); }
    
    .back-btn { background: transparent; border: 1px solid rgba(212, 175, 55, 0.5); color: var(--primary-blue); padding: 4px 12px; border-radius: 50px; font-size: 0.85rem; font-weight: 600; font-family: 'Jost', sans-serif; text-decoration: none; transition: var(--transition-smooth); display: inline-block; }
    .back-btn:hover { background: var(--easter-gold); color: #fff; border-color: var(--easter-gold); box-shadow: 0 4px 10px rgba(212,175,55,0.3); }

    .page-header { padding: 150px 5% 60px; text-align: center; background: linear-gradient(180deg, rgba(204,0,0,0.04) 0%, transparent 100%); }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; color: var(--primary-red); margin-bottom: 15px; }
    .page-header p { font-size: 1.1rem; max-width: 700px; margin: 0 auto; color: #555; line-height: 1.6; }

    .gallery-container { max-width: 1200px; margin: 20px auto 80px; padding: 0 5%; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .photo-item { width: 100%; height: 280px; overflow: hidden; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
    .photo-item:hover img { transform: scale(1.08); }
    
    footer { padding: 40px 5%; text-align: center; border-top: 1px solid rgba(0,0,0,0.05); font-size: 0.9rem; color: #666; }
    @media (max-width: 768px) {
      /* 1. iOS-Style Swipeable Language Track */
      .nav-left { 
        flex: 0 0 85px; /* Locks the container to exactly fit 1.5 buttons */
        flex-wrap: nowrap; 
        overflow-x: auto; 
        padding: 4px 0; 
        gap: 6px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch; /* Smooth scrolling on iPhones */
        scrollbar-width: none; 
        /* Fades out the right side so users know to swipe */
        -webkit-mask-image: linear-gradient(to right, black 60%, transparent 100%);
        mask-image: linear-gradient(to right, black 60%, transparent 100%);
      }
      .nav-left::-webkit-scrollbar { display: none; }
      
      /* 2. Lock Button Size & Pinned Active Status */
      .lang-btn { 
        width: 32px; 
        height: 32px; 
        font-size: 0.75rem; 
        flex-shrink: 0; /* Prevents the buttons from squishing */
        scroll-snap-align: start; 
      }
      .lang-btn.active { order: -1; } /* MAGIC TRICK: Always forces active language to the front! */
      
      /* 3. Keep the Logo Centered */
      .nav-right { flex: 0 0 85px; text-align: right; }
      .logo { font-size: 1.3rem; }
      
      /* 4. Social Sidebar Adjustment */
      .floating-socials { right: 10px; gap: 10px; } 
      .social-btn { width: 42px; height: 42px; } 
      .social-btn svg { width: 18px; height: 18px; } 
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ko">한</button>
      <button class="lang-btn" data-lang="es">ES</button>
      <button class="lang-btn" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="it">IT</button>
      <button class="lang-btn" data-lang="zh">中</button>
    </div>
    <div class="logo-container">
      <a href="index.html" class="logo">IVC <span style="color: var(--easter-gold);">SEOUL</span></a>
    </div>
    <div class="nav-right">
      <a href="index.html" class="back-btn" data-en="&larr; Back" data-ko="&larr; 뒤로" data-es="&larr; Volver" data-fr="&larr; Retour" data-it="&larr; Indietro" data-zh="&larr; 返回">&larr; Back</a>
    </div>
  </nav>

  <header class="page-header">
    <h1 data-en="WYD Events" data-ko="WYD 준비 활동" data-es="Eventos de la JMJ" data-fr="Événements des JMJ" data-it="Eventi GMG" data-zh="世青节活动">WYD Events</h1>
    <p data-en="Preparations, retreats, and festivals as we journey toward the World Youth Day Seoul 2027." 
       data-ko="2027년 서울 세계청년대회(WYD)를 준비하며 다양한 축제와 교육에 동참합니다."
       data-es="Preparativos, retiros y festivales mientras caminamos hacia la Jornada Mundial de la Juventud Seúl 2027."
       data-fr="Préparations, retraites et festivals en route vers les Journées Mondiales de la Jeunesse Séoul 2027."
       data-it="Preparativi, ritiri e festival nel nostro cammino verso la Giornata Mondiale della Gioventù di Seul 2027."
       data-zh="在迈向2027年首尔世界青年日的旅程中，我们举办准备活动、退省和节庆。">Preparations, retreats, and festivals as we journey toward the World Youth Day Seoul 2027.</p>
  </header>

  <main class="gallery-container">
    <div class="photo-grid">
      <div class="photo-item"><img src="wyd activities1776777102930.jpg" alt="WYD" loading="lazy"></div>
      <div class="photo-item"><img src="wyd activities1776785337963.jpg" alt="WYD" loading="lazy"></div>
      <div class="photo-item"><img src="wyd activities1776785379501.jpg" alt="WYD" loading="lazy"></div>
      <div class="photo-item"><img src="wyd activities1776785386685.jpg" alt="WYD" loading="lazy"></div>
      <div class="photo-item"><img src="wyd activities1776785638587.jpg" alt="WYD" loading="lazy"></div>
      <div class="photo-item"><img src="wyd activities1776785650115.jpg" alt="WYD" loading="lazy"></div>
      <div class="photo-item"><img src="wyd activities1776785656265.jpg" alt="WYD" loading="lazy"></div>
      <div class="photo-item"><img src="wyd activities1776785664499.jpg" alt="WYD" loading="lazy"></div>
      <div class="photo-item"><img src="wyd activities1776785675419.jpg" alt="WYD" loading="lazy"></div>
    </div>
  </main>

  <footer>
    <p style="font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--primary-blue);">IVC <span style="color: var(--easter-gold);">Seoul</span> ✝</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const currentLang = localStorage.getItem('ivc-lang') || 'en'; setLanguage(currentLang);
      document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', (e) => setLanguage(e.target.getAttribute('data-lang'))));
    });
    function setLanguage(lang) {
      localStorage.setItem('ivc-lang', lang); document.documentElement.lang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-lang') === lang));
      document.querySelectorAll(`[data-${lang}]`).forEach(el => el.innerText = el.getAttribute(`data-${lang}`));
    }
  </script>
</body>
</html>
